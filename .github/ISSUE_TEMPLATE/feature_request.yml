name: Feature request
description: 提出新功能或改进想法
labels: ['enhancement']
body:
  - type: textarea
    id: problem
    attributes:
      label: 背景与痛点
      description: 当前的不足或期望解决的场景。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 已考虑的替代方案
  - type: dropdown
    id: scope
    attributes:
      label: 涉及范围
      multiple: true
      options:
        - client
        - server
        - shared / DTO
        - CI / 部署
        - 文档
